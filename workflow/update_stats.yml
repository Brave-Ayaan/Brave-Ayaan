name: Update GitHub Profile Stats

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to run it manually from the "Actions" tab

jobs:
  update-svg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests lxml python-dateutil

      - name: Run Update Script
        run: today.py  # <-- CHANGE THIS to your actual .py filename
        env:
          ACCESS_TOKEN: ${{ secrets.GH_TOKEN }}
          USER_NAME: 'Brave-Ayaan'

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dark-mode.svg
          git commit -m "chore: updated profile stats [skip ci]" || echo "No changes to commit"
          git push
